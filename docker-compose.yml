version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: mongo_hypesoft
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express_hypesoft
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb

  backend:
    build: ./backend
    container_name: api_hypesoft
    ports:
      - "5000:5000"
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: frontend_hypesoft
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data: